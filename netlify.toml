<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Kai — Follow-Up Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--black:#0a0a0a;--dark:#111;--card:#161616;--border:#222;--amber:#d97706;--amber-dim:rgba(217,119,6,0.12);--white:#f0f0f0;--muted:#555;--font-head:'Barlow Condensed',sans-serif;--font-body:'Barlow',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--black);color:var(--white);font-family:var(--font-body);}
body{display:flex;flex-direction:column;align-items:center;min-height:100vh;}
.header{width:100%;background:var(--dark);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px;}
.brand-name{font-family:var(--font-head);font-size:22px;font-weight:900;letter-spacing:2px;}
.brand-name span{color:#fbbf24;}
.agent-badge{background:var(--amber-dim);border:1px solid rgba(217,119,6,0.3);color:#fbbf24;font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:2px;padding:4px 12px;border-radius:20px;text-transform:uppercase;}
.status-pill{display:flex;align-items:center;gap:6px;font-size:12px;color:#fbbf24;font-weight:600;letter-spacing:1px;}
.pulse{width:7px;height:7px;background:#fbbf24;border-radius:50%;animation:pulse 1.8s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.main{display:flex;width:100%;max-width:1100px;flex:1;padding:2rem;gap:1.5rem;align-items:flex-start;}
.sidebar{width:270px;flex-shrink:0;display:flex;flex-direction:column;gap:1rem;}
.kai-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.5rem;text-align:center;}
.kai-avatar{width:80px;height:80px;border-radius:50%;background:var(--amber-dim);border:2px solid rgba(217,119,6,0.3);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 1rem;}
.kai-name{font-family:var(--font-head);font-size:22px;font-weight:900;letter-spacing:2px;}
.kai-title{font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px;}
.kai-desc{font-size:13px;color:#777;line-height:1.6;margin-top:1rem;}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;}
.info-title{font-family:var(--font-head);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;}
.flow-step{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px;}
.flow-num{min-width:22px;height:22px;border-radius:50%;background:var(--amber-dim);border:1px solid rgba(217,119,6,0.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fbbf24;flex-shrink:0;}
.flow-text{font-size:12px;color:#888;line-height:1.5;}
.flow-text strong{color:#ccc;display:block;margin-bottom:2px;}
.action-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;}
.action-btn{display:block;width:100%;text-align:left;background:transparent;border:1px solid #2a2a2a;color:#aaa;padding:9px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:var(--font-body);margin-bottom:8px;transition:border-color 0.15s,color 0.15s;}
.action-btn:hover{border-color:#d97706;color:#fbbf24;background:var(--amber-dim);}
.chat-wrap{flex:1;display:flex;flex-direction:column;min-width:0;}
.output-panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1rem;}
.op-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border);}
.op-title{font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.copy-btn{background:var(--amber-dim);border:1px solid rgba(217,119,6,0.3);color:#fbbf24;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font-body);}
.op-content{font-size:14px;color:#ccc;line-height:1.8;white-space:pre-wrap;min-height:80px;}
.op-content.empty{color:#333;font-style:italic;}
.chat-box{background:var(--card);border:1px solid var(--border);border-radius:14px;display:flex;flex-direction:column;height:300px;overflow:hidden;}
.chat-messages{flex:1;overflow-y:auto;padding:1rem 1.5rem;display:flex;flex-direction:column;gap:0.75rem;}
.chat-messages::-webkit-scrollbar{width:4px;}
.chat-messages::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px;}
.msg{display:flex;gap:8px;align-items:flex-end;animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;}}
.msg.agent{flex-direction:row;}.msg.user{flex-direction:row-reverse;}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.msg.agent .msg-avatar{background:var(--amber-dim);border:1px solid rgba(217,119,6,0.3);}
.msg.user .msg-avatar{background:#1f1f1f;border:1px solid #2a2a2a;}
.msg-bubble{max-width:80%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;}
.msg.agent .msg-bubble{background:#1a1a1a;color:#ddd;border-bottom-left-radius:4px;}
.msg.user .msg-bubble{background:#d97706;color:#fff;border-bottom-right-radius:4px;}
.quick-replies{display:flex;flex-wrap:wrap;gap:6px;padding:0 1rem 0.75rem;}
.qr-btn{background:transparent;border:1px solid #2a2a2a;color:#aaa;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:border-color 0.15s,color 0.15s;}
.qr-btn:hover{border-color:#d97706;color:#fff;}
.typing-indicator{display:flex;gap:5px;align-items:center;padding:10px 14px;}
.typing-dot{width:5px;height:5px;background:#444;border-radius:50%;animation:typing 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:0.2s;}.typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes typing{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}
.chat-input-wrap{padding:0.75rem 1rem;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;background:var(--dark);border-radius:0 0 14px 14px;}
.chat-input{flex:1;background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:9px 14px;font-size:13px;font-family:var(--font-body);color:var(--white);outline:none;transition:border-color 0.2s;}
.chat-input::placeholder{color:#444;}.chat-input:focus{border-color:#d97706;}
.send-btn{background:#d97706;border:none;color:#fff;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;}
.send-btn:hover{background:#b45309;}.send-btn:disabled{background:#2a2a2a;cursor:not-allowed;}
@media(max-width:760px){.main{flex-direction:column;padding:1rem;}.sidebar{width:100%;}}
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="brand-name">QUICK<span>LINE</span> TIRES</div>
    <div class="agent-badge">Kai — Follow-Up</div>
  </div>
  <div class="status-pill"><div class="pulse"></div>ONLINE</div>
</div>
<div class="main">
  <div class="sidebar">
    <div class="kai-card">
      <div class="kai-avatar">🔁</div>
      <div class="kai-name">KAI</div>
      <div class="kai-title">Follow-Up Agent</div>
      <div class="kai-desc">I turn one-time customers into loyal fans — reviews, repeat sales, referrals, and promos on autopilot.</div>
    </div>
    <div class="info-card">
      <div class="info-title">Follow-Up Flow</div>
      <div class="flow-step"><div class="flow-num">1</div><div class="flow-text"><strong>2 hrs after install</strong>Thank you text + Google review link</div></div>
      <div class="flow-step"><div class="flow-num">2</div><div class="flow-text"><strong>3 days later</strong>Check-in — happy with your tires?</div></div>
      <div class="flow-step"><div class="flow-num">3</div><div class="flow-text"><strong>30 days later</strong>Referral ask — know anyone who needs tires?</div></div>
      <div class="flow-step"><div class="flow-num">4</div><div class="flow-text"><strong>6 months</strong>Seasonal promo + rotation reminder</div></div>
    </div>
    <div class="action-card">
      <div class="info-title">Quick Actions</div>
      <button class="action-btn" onclick="triggerAction('Write a post-install thank you + Google review request SMS for a customer named Maria who just got 4 tires installed')">⭐ Review Request SMS</button>
      <button class="action-btn" onclick="triggerAction('Write a referral outreach text for a past customer — casual Miami tone, offer $20 off their next visit if they refer someone')">🤝 Referral Outreach</button>
      <button class="action-btn" onclick="triggerAction('Write a seasonal promo SMS — summer heat is tough on tires, create urgency for a tire check deal')">🔥 Seasonal Promo SMS</button>
      <button class="action-btn" onclick="triggerAction('A customer seems unhappy — write a response to de-escalate and offer to make it right, involve the owner')">⚠️ Handle Unhappy Customer</button>
      <button class="action-btn" onclick="triggerAction('Write a 6-month win-back message for a customer who has not bought since their last purchase')">🔄 Win-Back Message</button>
    </div>
  </div>
  <div class="chat-wrap">
    <div class="output-panel">
      <div class="op-header">
        <div class="op-title" id="op-title">Message Output</div>
        <button class="copy-btn" onclick="copyMsg()">Copy ↗</button>
      </div>
      <div class="op-content empty" id="op-content">Click an action or type a request — Kai will write the perfect follow-up message...</div>
    </div>
    <div class="chat-box">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="quick-replies" id="quick-replies"></div>
      <div class="chat-input-wrap">
        <input class="chat-input" id="chat-input" placeholder="Describe the situation or customer..." autocomplete="off"/>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>
<script>
const msgs=[];
const systemPrompt=`You are Kai, the follow-up agent for Quick Line Tires — Miami mobile tire business. Your job: keep customers happy after the sale, get reviews, drive repeat business, and handle complaints before they go public.

Owner number: (786) 942-7883
Google Review link: [google.com/maps review link — owner to add]
Instagram: @quickline.tires

Personality: warm, genuine, Miami-friendly. Texts should sound human, not corporate. Short and punchy.

When writing messages:
- SMS/texts: max 160 characters per message where possible, casual tone
- Always include a clear action (leave a review, call us, DM us)
- For complaints: empathize first, offer a solution, escalate to owner if needed
- For reviews: make it super easy — give them the direct link
- For promos: create urgency but don't be pushy

After writing the message, put "MESSAGE_READY" on its own line.

Always think: what would make this customer feel valued and want to come back?`;

async function callClaude(msg){
  msgs.push({role:'user',content:msg});
  const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,system:systemPrompt,messages:msgs})});
  const data=await res.json();
  const reply=data.content.map(b=>b.text||'').join('');
  msgs.push({role:'assistant',content:reply});
  return reply;
}

function renderMsg(text){
  const clean=text.replace('MESSAGE_READY','').trim();
  const el=document.getElementById('op-content');
  el.textContent=clean;el.classList.remove('empty');
}

function copyMsg(){
  navigator.clipboard.writeText(document.getElementById('op-content').textContent).then(()=>alert('Copied!'));
}

function triggerAction(prompt){handleSend(prompt);}

function showTyping(){
  const d=document.createElement('div');d.className='msg agent';d.id='typing-msg';
  d.innerHTML=`<div class="msg-avatar">🔁</div><div class="msg-bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  document.getElementById('chat-messages').appendChild(d);scrollBottom();
}
function removeTyping(){const t=document.getElementById('typing-msg');if(t)t.remove();}
function addMessage(role,text){
  const clean=text.replace('MESSAGE_READY','').trim().substring(0,180);if(!clean)return;
  const d=document.createElement('div');d.className=`msg ${role}`;
  const av=role==='agent'?'🔁':'👤';
  d.innerHTML=`<div class="msg-avatar">${av}</div><div class="msg-bubble">${clean.replace(/\n/g,'<br>')}${text.length>180?'...':''}</div>`;
  document.getElementById('chat-messages').appendChild(d);scrollBottom();
}
function scrollBottom(){const c=document.getElementById('chat-messages');c.scrollTop=c.scrollHeight;}
function showQR(opts){
  const qr=document.getElementById('quick-replies');qr.innerHTML='';
  opts.forEach(o=>{const b=document.createElement('button');b.className='qr-btn';b.textContent=o;b.onclick=()=>{qr.innerHTML='';handleSend(o);};qr.appendChild(b);});
}
async function handleSend(text){
  if(!text.trim())return;
  document.getElementById('chat-input').value='';document.getElementById('send-btn').disabled=true;
  addMessage('user',text.length>100?text.substring(0,100)+'...':text);showTyping();
  try{
    const reply=await callClaude(text);removeTyping();
    if(reply.includes('MESSAGE_READY')){renderMsg(reply);addMessage('agent','Message ready above — copy and send 🔥');}
    else{addMessage('agent',reply);}
    showQR(['Make it shorter','More personal','Add urgency','Write a follow-up if no reply']);
  }catch(e){removeTyping();addMessage('agent','Error — try again.');}
  document.getElementById('send-btn').disabled=false;document.getElementById('chat-input').focus();
}
function sendMessage(){const v=document.getElementById('chat-input').value.trim();if(v)handleSend(v);}
document.getElementById('chat-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendMessage();});
function init(){addMessage('agent',"Ready to work. Pick a quick action or tell me about a customer situation and I'll write the perfect follow-up.");showQR(['Customer just got tires installed','Unhappy customer complaint','Win back old customer','Seasonal tire promo']);}
init();
</script>
</body>
</html>
