<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Nova — Social Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--black:#0a0a0a;--dark:#111;--card:#161616;--border:#222;--purple:#7c3aed;--purple-dim:rgba(124,58,237,0.12);--white:#f0f0f0;--muted:#555;--font-head:'Barlow Condensed',sans-serif;--font-body:'Barlow',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--black);color:var(--white);font-family:var(--font-body);}
body{display:flex;flex-direction:column;align-items:center;min-height:100vh;}
.header{width:100%;background:var(--dark);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px;}
.brand-name{font-family:var(--font-head);font-size:22px;font-weight:900;letter-spacing:2px;}
.brand-name span{color:#a78bfa;}
.agent-badge{background:var(--purple-dim);border:1px solid rgba(124,58,237,0.3);color:#a78bfa;font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:2px;padding:4px 12px;border-radius:20px;text-transform:uppercase;}
.status-pill{display:flex;align-items:center;gap:6px;font-size:12px;color:#a78bfa;font-weight:600;letter-spacing:1px;}
.pulse{width:7px;height:7px;background:#a78bfa;border-radius:50%;animation:pulse 1.8s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.main{display:flex;width:100%;max-width:1200px;flex:1;padding:2rem;gap:1.5rem;align-items:flex-start;}
.sidebar{width:260px;flex-shrink:0;display:flex;flex-direction:column;gap:1rem;}
.nova-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.5rem;text-align:center;}
.nova-avatar{width:80px;height:80px;border-radius:50%;background:var(--purple-dim);border:2px solid rgba(124,58,237,0.3);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 1rem;}
.nova-name{font-family:var(--font-head);font-size:22px;font-weight:900;letter-spacing:2px;}
.nova-title{font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px;}
.nova-desc{font-size:13px;color:#777;line-height:1.6;margin-top:1rem;}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;}
.info-title{font-family:var(--font-head);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;}
.content-type-btn{display:block;width:100%;text-align:left;background:transparent;border:1px solid #2a2a2a;color:#aaa;padding:9px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:var(--font-body);margin-bottom:8px;transition:border-color 0.15s,color 0.15s;}
.content-type-btn:hover,.content-type-btn.active{border-color:#7c3aed;color:#a78bfa;background:var(--purple-dim);}
.chat-area{flex:1;display:flex;flex-direction:column;gap:1rem;min-width:0;}
.content-output{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.5rem;flex:1;}
.output-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.output-title{font-family:var(--font-head);font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.copy-btn{background:var(--purple-dim);border:1px solid rgba(124,58,237,0.3);color:#a78bfa;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font-body);}
.copy-btn:hover{background:rgba(124,58,237,0.2);}
.output-content{font-size:14px;color:#ccc;line-height:1.8;white-space:pre-wrap;min-height:100px;}
.output-content.empty{color:#333;font-style:italic;}
.hashtag-section{margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);}
.hashtag-label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.hashtags{font-size:13px;color:#7c3aed;line-height:1.8;}
.chat-box{background:var(--card);border:1px solid var(--border);border-radius:14px;display:flex;flex-direction:column;height:260px;overflow:hidden;}
.chat-messages{flex:1;overflow-y:auto;padding:1rem 1.5rem;display:flex;flex-direction:column;gap:0.75rem;}
.chat-messages::-webkit-scrollbar{width:4px;}
.chat-messages::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px;}
.msg{display:flex;gap:8px;align-items:flex-end;animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;}}
.msg.agent{flex-direction:row;}.msg.user{flex-direction:row-reverse;}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.msg.agent .msg-avatar{background:var(--purple-dim);border:1px solid rgba(124,58,237,0.3);}
.msg.user .msg-avatar{background:#1f1f1f;border:1px solid #2a2a2a;}
.msg-bubble{max-width:80%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;}
.msg.agent .msg-bubble{background:#1a1a1a;color:#ddd;border-bottom-left-radius:4px;}
.msg.user .msg-bubble{background:#7c3aed;color:#fff;border-bottom-right-radius:4px;}
.quick-replies{display:flex;flex-wrap:wrap;gap:6px;padding:0 1rem 0.75rem;}
.qr-btn{background:transparent;border:1px solid #2a2a2a;color:#aaa;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:border-color 0.15s,color 0.15s;}
.qr-btn:hover{border-color:#7c3aed;color:#fff;}
.typing-indicator{display:flex;gap:5px;align-items:center;padding:10px 14px;}
.typing-dot{width:5px;height:5px;background:#444;border-radius:50%;animation:typing 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:0.2s;}.typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes typing{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}
.chat-input-wrap{padding:0.75rem 1rem;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;background:var(--dark);border-radius:0 0 14px 14px;}
.chat-input{flex:1;background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:9px 14px;font-size:13px;font-family:var(--font-body);color:var(--white);outline:none;transition:border-color 0.2s;}
.chat-input::placeholder{color:#444;}.chat-input:focus{border-color:#7c3aed;}
.send-btn{background:#7c3aed;border:none;color:#fff;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;}
.send-btn:hover{background:#6d28d9;}.send-btn:disabled{background:#2a2a2a;cursor:not-allowed;}
@media(max-width:760px){.main{flex-direction:column;padding:1rem;}.sidebar{width:100%;}}
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="brand-name">QUICK<span>LINE</span> TIRES</div>
    <div class="agent-badge">Nova — Social Agent</div>
  </div>
  <div class="status-pill"><div class="pulse"></div>ONLINE</div>
</div>
<div class="main">
  <div class="sidebar">
    <div class="nova-card">
      <div class="nova-avatar">📸</div>
      <div class="nova-name">NOVA</div>
      <div class="nova-title">Social Media Agent</div>
      <div class="nova-desc">I write your Instagram captions, hashtags, DM replies, and weekly content calendars so you're always posting.</div>
    </div>
    <div class="info-card">
      <div class="info-title">Generate Content</div>
      <button class="content-type-btn active" onclick="setType(this,'post')">📝 Instagram Post</button>
      <button class="content-type-btn" onclick="setType(this,'story')">⚡ Story Caption</button>
      <button class="content-type-btn" onclick="setType(this,'dm')">💬 DM Reply</button>
      <button class="content-type-btn" onclick="setType(this,'reel')">🎬 Reel Hook</button>
      <button class="content-type-btn" onclick="setType(this,'calendar')">🗓️ Weekly Calendar</button>
      <button class="content-type-btn" onclick="setType(this,'promo')">🔥 Promo / Deal Post</button>
    </div>
  </div>
  <div class="chat-area">
    <div class="content-output">
      <div class="output-header">
        <div class="output-title" id="output-title">Content Output</div>
        <button class="copy-btn" onclick="copyContent()">Copy ↗</button>
      </div>
      <div class="output-content empty" id="output-content">Tell Nova what you want to post about and she'll write it instantly...</div>
      <div class="hashtag-section" id="hashtag-section" style="display:none">
        <div class="hashtag-label">Hashtags</div>
        <div class="hashtags" id="hashtags"></div>
      </div>
    </div>
    <div class="chat-box">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="quick-replies" id="quick-replies"></div>
      <div class="chat-input-wrap">
        <input class="chat-input" id="chat-input" placeholder="Describe your post idea..." autocomplete="off"/>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>
<script>
const msgs=[];
let currentType='post';
const systemPrompt=`You are Nova, the social media agent for Quick Line Tires — a Miami-based mobile tire business. Your job: create high-converting, authentic Instagram content that grows the page and drives DMs from potential customers.

Brand voice: bold, confident, street-smart Miami energy. Use some slang but keep it professional. Emojis are fine — use them purposefully. No corporate speak.

Instagram handle: @quickline.tires
Owner phone: (786) 942-7883
Business: Mobile tire sales + installation, partner shop network, Miami-Dade/Broward service area

When generating content, label the type clearly:
- For posts: write the caption then list 20–25 relevant hashtags on a new line starting with "HASHTAGS:"
- For DM replies: write a warm, helpful response that moves toward booking
- For reels: give a punchy opening hook (first 3 seconds is everything)
- For weekly calendar: give Mon–Sat with post theme, caption idea, and best time to post
- For promos: create urgency with a limited-time feel

Always include a subtle CTA: "DM us" or "Link in bio" or "Text (786) 942-7883"

Keep captions under 150 words unless it's a calendar or long-form request. 
After generating, put "CONTENT_READY" on its own line so the UI can detect it.`;

async function callClaude(msg){
  msgs.push({role:'user',content:msg});
  const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,system:systemPrompt,messages:msgs})});
  const data=await res.json();
  const reply=data.content.map(b=>b.text||'').join('');
  msgs.push({role:'assistant',content:reply});
  return reply;
}

function setType(btn,type){
  document.querySelectorAll('.content-type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');currentType=type;
  const labels={post:'Instagram Post',story:'Story Caption',dm:'DM Reply',reel:'Reel Hook',calendar:'Weekly Content Calendar',promo:'Promo Post'};
  document.getElementById('output-title').textContent=labels[type]||'Content';
}

function renderContent(text){
  let content=text.replace('CONTENT_READY','').trim();
  let hashtags='';
  if(content.includes('HASHTAGS:')){
    const parts=content.split('HASHTAGS:');
    content=parts[0].trim();
    hashtags=parts[1].trim();
  }
  const el=document.getElementById('output-content');
  el.textContent=content;el.classList.remove('empty');
  const hs=document.getElementById('hashtag-section');
  if(hashtags){hs.style.display='block';document.getElementById('hashtags').textContent=hashtags;}
  else{hs.style.display='none';}
}

function copyContent(){
  const c=document.getElementById('output-content').textContent;
  const h=document.getElementById('hashtags').textContent;
  navigator.clipboard.writeText(c+(h?'\n\n'+h:'')).then(()=>alert('Copied to clipboard!'));
}

function showTyping(){
  const d=document.createElement('div');d.className='msg agent';d.id='typing-msg';
  d.innerHTML=`<div class="msg-avatar">📸</div><div class="msg-bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  document.getElementById('chat-messages').appendChild(d);scrollBottom();
}
function removeTyping(){const t=document.getElementById('typing-msg');if(t)t.remove();}
function addMessage(role,text){
  const clean=text.replace('CONTENT_READY','').split('HASHTAGS:')[0].trim();if(!clean)return;
  const d=document.createElement('div');d.className=`msg ${role}`;
  const av=role==='agent'?'📸':'👤';
  d.innerHTML=`<div class="msg-avatar">${av}</div><div class="msg-bubble">${clean.replace(/\n/g,'<br>').substring(0,200)}${clean.length>200?'...':''}</div>`;
  document.getElementById('chat-messages').appendChild(d);scrollBottom();
}
function scrollBottom(){const c=document.getElementById('chat-messages');c.scrollTop=c.scrollHeight;}
function showQR(opts){
  const qr=document.getElementById('quick-replies');qr.innerHTML='';
  opts.forEach(o=>{const b=document.createElement('button');b.className='qr-btn';b.textContent=o;b.onclick=()=>{qr.innerHTML='';handleSend(o);};qr.appendChild(b);});
}
async function handleSend(text){
  if(!text.trim())return;
  document.getElementById('chat-input').value='';document.getElementById('send-btn').disabled=true;
  const fullMsg=`Generate a ${currentType} about: ${text}`;
  addMessage('user',text);showTyping();
  try{
    const reply=await callClaude(fullMsg);removeTyping();
    if(reply.includes('CONTENT_READY')){renderContent(reply);addMessage('agent','Done! Content is ready above — copy it and post 🔥');}
    else{addMessage('agent',reply);}
    showQR(['Write another version','Make it shorter','Add more urgency','Generate matching story']);
  }catch(e){removeTyping();addMessage('agent','Something went wrong — try again.');}
  document.getElementById('send-btn').disabled=false;document.getElementById('chat-input').focus();
}
function sendMessage(){const v=document.getElementById('chat-input').value.trim();if(v)handleSend(v);}
document.getElementById('chat-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendMessage();});
function init(){
  addMessage('agent',"What do you want to post about today? I'll write the caption and hashtags instantly.");
  showQR(['We come to you — mobile tires','New tires = new car feeling','Before & after install','Limited time deal — 4 tires','Weekly content calendar']);
}
init();
</script>
</body>
</html>
